name: Security (Snyk)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  snyk-backend:
    name: Python dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk test
        run: snyk test --severity-threshold=high --file=backend/requirements.txt
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk monitor
        if: github.ref == 'refs/heads/main'
        run: snyk monitor --file=backend/requirements.txt
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  snyk-frontend:
    name: Node dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install --prefix frontend

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk test
        run: snyk test --severity-threshold=high --file=frontend/package.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk monitor
        if: github.ref == 'refs/heads/main'
        run: snyk monitor --file=frontend/package.json
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
