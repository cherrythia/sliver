services:
  db:
    image: cockroachdb/cockroach:v24.3.0
    command: start-single-node --insecure
    ports:
      - "26257:26257"   # SQL (psycopg2 connects here)
      - "8080:8080"     # DB Console — open http://localhost:8080 in browser
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "cockroach", "sql", "--insecure", "--execute=SELECT 1"]
      interval: 5s
      timeout: 10s
      retries: 15

  backend:
    build: ./backend
    environment:
      DATABASE_URL: cockroachdb+psycopg2://root@db:26257/silver?sslmode=disable
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DATA_DIR: /app/data
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  cockroach-data:
