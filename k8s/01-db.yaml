---
# StorageClass backed by EFS CSI driver (static provisioning)
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: efs-sc
provisioner: efs.csi.aws.com

---
# PersistentVolume referencing the EFS file system
# ${EFS_FILE_SYSTEM_ID} is substituted by the deploy workflow from SSM
apiVersion: v1
kind: PersistentVolume
metadata:
  name: cockroach-pv
spec:
  capacity:
    storage: 20Gi
  volumeMode: Filesystem
  accessModes: [ReadWriteMany]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: efs-sc
  csi:
    driver: efs.csi.aws.com
    volumeHandle: ${EFS_FILE_SYSTEM_ID}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cockroach-pvc
  namespace: silver
spec:
  accessModes: [ReadWriteMany]
  storageClassName: efs-sc
  resources:
    requests:
      storage: 20Gi
  volumeName: cockroach-pv

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cockroachdb
  namespace: silver
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cockroachdb
  template:
    metadata:
      labels:
        app: cockroachdb
    spec:
      containers:
        - name: cockroachdb
          image: cockroachdb/cockroach:v24.3.0
          command: ["cockroach", "start-single-node", "--insecure"]
          ports:
            - containerPort: 26257
            - containerPort: 8080
          readinessProbe:
            exec:
              command: ["cockroach", "sql", "--insecure", "--execute=SELECT 1"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          volumeMounts:
            - name: cockroach-data
              mountPath: /cockroach/cockroach-data
      volumes:
        - name: cockroach-data
          persistentVolumeClaim:
            claimName: cockroach-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: cockroachdb
  namespace: silver
spec:
  selector:
    app: cockroachdb
  ports:
    - name: sql
      port: 26257
      targetPort: 26257
  type: ClusterIP
