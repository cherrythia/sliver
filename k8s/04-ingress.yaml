---
# Frontend ingress — port 80 only. Same ALB group as the API ingress below.
# Requires: AWS Load Balancer Controller installed in kube-system.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: silver-ingress
  namespace: silver
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: silver
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

---
# Backend (API) ingress — port 8000 only. Shares the same ALB as above.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: silver-ingress-api
  namespace: silver
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/group.name: silver
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 8000}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
